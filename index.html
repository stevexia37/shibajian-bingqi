const TOTAL = 15000;          // 总粒子数（先生要舒服，1.5 万合适）
const FIELD_R = 4.8;          // 散落半径（铺满屏）
const TARGET_SCALE = 2.0;     // 兵器目标缩放（先生要舒服，缩小一点）

// 每件兵器的阶段时长（毫秒）

// ===================== 粒子 =====================
function mulberry32(seed){return function(){let t=seed+=0x6D2B79F5;t=Math.imul(t^t>>>15,t|1);t^=t+Math.imul(t^t>>>7,t|61);return((t^t>>>14)>>>0)/4294967296}}
const rng = mulberry32(2026);

function randomScatterPos(){
  // 球壳分布（让粒子铺满一个壳层）
  const u = rng();
  const v = rng();
  const theta = 2 * Math.PI * u;
  const phi = Math.acos(2 * v - 1);
  const r = FIELD_R * (0.6 + 0.4 * Math.cbrt(rng()));
  return [
    r * Math.sin(phi) * Math.cos(theta),
    r * Math.sin(phi) * Math.sin(theta) * 0.7,  // y 稍扁，匹配手机屏
    (rng() - 0.5) * FIELD_DEPTH * 2,
  ];
}

// 预先生成所有粒子的目标点分配（每件兵器一次）
// 关键：每件兵器随机抽取 15000 个目标点（带重复），保证全部粒子都参与
function getTargetPositions(name){
  const pts = TARGETS[name];
  const positions = new Float32Array(TOTAL * 3);
  for (let i = 0; i < TOTAL; i++){
    // 随机选一个目标点（带重复填充）
    const idx = Math.floor(rng() * pts.length);
    const [x, y] = pts[idx];
    // 加微小抖动让粒子看起来在兵器表面而不是死板的格点
    const jx = (rng() - 0.5) * 0.02;
    const jy = (rng() - 0.5) * 0.02;
    positions[i*3] = x * TARGET_SCALE + jx;
    positions[i*3+1] = -y * TARGET_SCALE + jy;  // y 翻转
    positions[i*3+2] = (rng() - 0.5) * 0.06;
  }
  return positions;
}

// ===================== 粒子属性 =====================
const positions = new Float32Array(TOTAL * 3);
const colors = new Float32Array(TOTAL * 3);
const sizes = new Float32Array(TOTAL);
const phases = new Float32Array(TOTAL);
const targets = new Float32Array(TOTAL * 3);     // 当前兵器目标
const scatterTargets = new Float32Array(TOTAL * 3); // 当前散落目标
const velocities = new Float32Array(TOTAL * 3);  // 速度
const bornTimes = new Float32Array(TOTAL);       // 每粒子的出生时间（用于错峰汇聚）
const trailLife = new Float32Array(TOTAL);       // 每粒子当前速度强度

// 初始化所有粒子：散落态
for (let i = 0; i < TOTAL; i++){
  const [x, y, z] = randomScatterPos();
  positions[i*3] = x;
  positions[i*3+1] = y;
  positions[i*3+2] = z;
  scatterTargets[i*3] = x;
  scatterTargets[i*3+1] = y;
  scatterTargets[i*3+2] = z;
  targets[i*3] = x;
  targets[i*3+1] = y;
  targets[i*3+2] = z;

  // 颜色（银白主调，少量金/冷色点缀）
  const w = rng();
  if (w < 0.08){
    colors[i*3] = 1.0; colors[i*3+1] = 0.78; colors[i*3+2] = 0.42;  // 金
  } else if (w < 0.65){
    colors[i*3] = 0.95; colors[i*3+1] = 0.92; colors[i*3+2] = 0.85; // 银白
  } else if (w < 0.85){
    colors[i*3] = 0.82; colors[i*3+1] = 0.86; colors[i*3+2] = 0.95; // 冷白
  } else {
    colors[i*3] = 0.95; colors[i*3+1] = 0.85; colors[i*3+2] = 0.7;  // 暖白
  }

  sizes[i] = 0.018 + rng() * 0.012;
  phases[i] = rng() * Math.PI * 2;
  velocities[i*3] = velocities[i*3+1] = velocities[i*3+2] = 0;
  bornTimes[i] = rng() * 1.0;  // 0-1 出生时间分布，让汇聚有先后
  trailLife[i] = 0;
}

// ===================== Shader =====================
const geo = new THREE.BufferGeometry();
geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
geo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
geo.setAttribute('phase', new THREE.BufferAttribute(phases, 1));

const mat = new THREE.ShaderMaterial({
  vertexShader: `
    attribute float size;
    attribute float phase;
    attribute vec3 color;
    varying vec3 vColor;
    varying float vDist;
    void main(){
      vColor = color;
      vec4 mv = modelViewMatrix * vec4(position, 1.0);
      vDist = -mv.z;
      gl_PointSize = size * 480.0 / vDist;
      gl_Position = projectionMatrix * mv;
    }
  `,
  fragmentShader: `
    varying vec3 vColor;
    varying float vDist;
    void main(){
      vec2 uv = gl_PointCoord - vec2(0.5);
      float d = length(uv);
      if (d > 0.5) discard;
      float alpha = smoothstep(0.5, 0.0, d);
      // 距离衰减（远暗近亮）
      float df = clamp(1.0 - vDist / 12.0, 0.2, 1.0);
      // 加中心亮、外圈柔和
      float core = 1.0 - d * 1.2;
      core = max(core, 0.0);
      vec3 finalColor = vColor * (1.0 + core * 0.8);
      gl_FragColor = vec4(finalColor, alpha * df);
    }
  `,
  transparent: true,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
});

const pointsObj = new THREE.Points(geo, mat);
scene.add(pointsObj);

// ===================== 背景星云（暗） =====================
const bgN = 800;
const bgPos = new Float32Array(bgN * 3);
for (let i = 0; i < bgN; i++){
  const th = rng() * Math.PI * 2;
  const ph = Math.acos(2 * rng() - 1);
  const r = 11 + rng() * 6;
  bgPos[i*3] = r * Math.sin(ph) * Math.cos(th);
  bgPos[i*3+1] = r * Math.sin(ph) * Math.sin(th);
  bgPos[i*3+2] = r * Math.cos(ph);
}
const bgGeo = new THREE.BufferGeometry();
bgGeo.setAttribute('position', new THREE.BufferAttribute(bgPos, 3));
const bgMat = new THREE.PointsMaterial({
  color: 0x3a2a14, size: 0.022, transparent: true, opacity: 0.5,
  blending: THREE.AdditiveBlending, depthWrite: false,
});
scene.add(new THREE.Points(bgGeo, bgMat));

// ===================== 状态机 =====================
const PH = { IDLE: 0, SCATTER: 1, ASSEMBLE: 2, HOLD: 3, SHATTER: 4 };
let phase = PH.IDLE;
let phaseStart = 0;
let currentIdx = -1;
let sceneTime = 0;
let isStarted = false;

function easeInOutCubic(t){ return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3)/2; }
function easeOutCubic(t){ return 1 - Math.pow(1-t, 3); }
function easeInQuad(t){ return t*t; }
function easeOutQuad(t){ return t*(2-t); }

function activateWeapon(idx){
  currentIdx = idx;
  const name = ORDER[idx];
  // 重新生成该兵器的目标点（随机抽 15000 个）
  const newTargets = getTargetPositions(name);
  // 当前所有粒子的"散落目标"= 当前位置（保留每粒子当前散落位置）
  // 然后"汇聚目标"= 新兵器的目标点（随机分配）
  for (let i = 0; i < TOTAL; i++){
    scatterTargets[i*3] = positions[i*3];
    scatterTargets[i*3+1] = positions[i*3+1];
    scatterTargets[i*3+2] = positions[i*3+2];
    targets[i*3] = newTargets[i*3];
    targets[i*3+1] = newTargets[i*3+1];
    targets[i*3+2] = newTargets[i*3+2];
    velocities[i*3] = velocities[i*3+1] = velocities[i*3+2] = 0;
    // 重新分配出生时间（错峰汇聚效果）
    bornTimes[i] = rng() * 1.0;
    trailLife[i] = 0;
  }
  phase = PH.ASSEMBLE;
  phaseStart = performance.now();
  showName(name);
  updateProgress(idx);
}

function startScatterTo(idx){
  // 从当前位置散落到全屏，然后进入 SCATTER 阶段，到时再 ASSEMBLE
  currentIdx = idx;
  const name = ORDER[idx];
  const newScatter = new Float32Array(TOTAL * 3);
  for (let i = 0; i < TOTAL; i++){
    const [x, y, z] = randomScatterPos();
    newScatter[i*3] = x;
    newScatter[i*3+1] = y;
    newScatter[i*3+2] = z;
  }
  // 兵器的目标点 = 先存好，等 SCATTER 完才用
  const newTargets = getTargetPositions(name);
  for (let i = 0; i < TOTAL; i++){
    scatterTargets[i*3] = newScatter[i*3];
    scatterTargets[i*3+1] = newScatter[i*3+1];
    scatterTargets[i*3+2] = newScatter[i*3+2];
    targets[i*3] = newTargets[i*3];
    targets[i*3+1] = newTargets[i*3+1];
    targets[i*3+2] = newTargets[i*3+2];
    velocities[i*3] = velocities[i*3+1] = velocities[i*3+2] = 0;
    bornTimes[i] = rng() * 1.0;
  }
  phase = PH.SCATTER;
  phaseStart = performance.now();
  hideName();
  updateProgress(idx);
}

function showName(name){
  document.getElementById('char').textContent = name;
  document.getElementById('sub').textContent = SUB_TEXTS[name] || '';
  document.getElementById('name').classList.add('show');
}
function hideName(){
  document.getElementById('name').classList.remove('show');
}
function updateProgress(idx){
  const c = document.getElementById('progress');
  if (c.children.length !== ORDER.length){
    c.innerHTML = '';
    for (let i = 0; i < ORDER.length; i++){
      const d = document.createElement('div');
      d.className = 'dot';
      c.appendChild(d);
    }
  }
  for (let i = 0; i < c.children.length; i++){
    const d = c.children[i];
    d.className = 'dot';
    if (i < idx) d.classList.add('passed');
    else if (i === idx) d.classList.add('active');
  }
}

// ===================== 交互 =====================
document.getElementById('startBtn').addEventListener('click', () => {
  document.getElementById('intro').classList.add('hide');
  document.getElementById('title').classList.add('show');
  setTimeout(() => document.getElementById('hint').classList.add('show'), 4000);
  isStarted = true;
  // 第一件兵器：先随机打散一个起始位置（已经初始化），然后直接 ASSEMBLE
  // 先生第一次看到的是"粒子云凝聚成刀"
  currentIdx = 0;
  const name = ORDER[0];
  const newTargets = getTargetPositions(name);
  for (let i = 0; i < TOTAL; i++){
    targets[i*3] = newTargets[i*3];
    targets[i*3+1] = newTargets[i*3+1];
    targets[i*3+2] = newTargets[i*3+2];
    bornTimes[i] = rng() * 1.0;
  }
  phase = PH.ASSEMBLE;
  phaseStart = performance.now();
  showName(name);
  updateProgress(0);
});

const ripples = [];
canvas.addEventListener('pointerdown', (e) => {
  const x = (e.clientX / window.innerWidth - 0.5) * 2;
  const y = -(e.clientY / window.innerHeight - 0.5) * 2;
  ripples.push({
    time: 0,
    life: 1.4,
    origin: new THREE.Vector3(x * 1.8, y * 1.4, 0),
    maxR: 6,
  });
});

// ===================== 动画循环 =====================
let lastFrame = performance.now();

function animate(now){
  const dt = Math.min(0.05, (now - lastFrame) / 1000);
  sceneTime += dt;
  lastFrame = now;
  const elapsed = now - phaseStart;
  const posAttr = geo.getAttribute('position');

  if (!isStarted){
    // 入场前：粒子慢慢飘移
    for (let i = 0; i < TOTAL; i++){
      positions[i*3] += Math.sin(sceneTime * 0.3 + phases[i]) * 0.0008;
      positions[i*3+1] += Math.cos(sceneTime * 0.4 + phases[i]) * 0.0008;
      positions[i*3+2] += Math.sin(sceneTime * 0.5 + phases[i] * 0.7) * 0.0008;
    }
  } else if (phase === PH.ASSEMBLE){
    // 汇聚成兵器：每粒子按 bornTime 错峰到达
    const dur = DUR.ASSEMBLE;
    for (let i = 0; i < TOTAL; i++){
      // 该粒子的"启动时间"和"完成时间"
      const start = bornTimes[i] * 0.5;
      const end = start + 0.5;
      const localT = Math.min(1, Math.max(0, (elapsed/dur - start) / (end - start)));
      const e = easeInOutCubic(localT);
      const sx = scatterTargets[i*3];
      const sy = scatterTargets[i*3+1];
      const sz = scatterTargets[i*3+2];
      const tx = targets[i*3];
      const ty = targets[i*3+1];
      const tz = targets[i*3+2];
      // 弧线路径（向上漂的贝塞尔感）
      const arc = Math.sin(localT * Math.PI) * 0.15;
      positions[i*3] = sx + (tx - sx) * e;
      positions[i*3+1] = sy + (ty - sy) * e + arc;
      positions[i*3+2] = sz + (tz - sz) * e;
    }
    if (elapsed >= dur + 500){  // 错峰余量
      phase = PH.HOLD;
      phaseStart = now;
    }
  } else if (phase === PH.HOLD){
    // 成型：呼吸扰动 + 极慢自转
    const wob = Math.sin(sceneTime * 1.4) * 0.004;
    for (let i = 0; i < TOTAL; i++){
      const tx = targets[i*3] + Math.sin(sceneTime * 1.2 + phases[i]) * 0.005;
      const ty = targets[i*3+1] + Math.cos(sceneTime * 1.0 + phases[i]) * 0.005;
      const tz = targets[i*3+2];
      positions[i*3] = tx;
      positions[i*3+1] = ty;
      positions[i*3+2] = tz + wob;
    }
    if (elapsed >= DUR.HOLD){
      // 进入击碎阶段
      phase = PH.SHATTER;
      phaseStart = now;
      hideName();
      // 给每个粒子一个**径向向外**的速度（从兵器中心向外）
      // 速度大小按 bornTime 错峰（外层粒子先爆裂）
      for (let i = 0; i < TOTAL; i++){
        const px = positions[i*3];
        const py = positions[i*3+1];
        const pz = positions[i*3+2];
        const d = Math.sqrt(px*px + py*py + pz*pz) + 0.001;
        // 离中心越远，速度稍大（外层先扩散）
        const sp = 1.5 + rng() * 1.8;
        velocities[i*3] = px / d * sp;
        velocities[i*3+1] = py / d * sp + 0.2;
        velocities[i*3+2] = pz / d * sp;
        trailLife[i] = 1.0;
      }
    }
  } else if (phase === PH.SHATTER){
    // 爆裂散开
    for (let i = 0; i < TOTAL; i++){
      positions[i*3] += velocities[i*3] * dt;
      positions[i*3+1] += velocities[i*3+1] * dt;
      positions[i*3+2] += velocities[i*3+2] * dt;
      velocities[i*3] *= 0.94;
      velocities[i*3+1] *= 0.94;
      velocities[i*3+2] *= 0.94;
      trailLife[i] *= 0.96;
    }
    if (elapsed >= DUR.SHATTER){
      // 进入散落阶段（铺满全屏）+ 准备下一件兵器
      const nextIdx = (currentIdx + 1) % ORDER.length;
      startScatterTo(nextIdx);
    }
  } else if (phase === PH.SCATTER){
    // 从击碎后位置继续向外飘移，让粒子铺满全屏
    const t = Math.min(1, elapsed / DUR.SCATTER);
    for (let i = 0; i < TOTAL; i++){
      // 从当前位置缓动到全屏散落位置
      const sx = positions[i*3];
      const sy = positions[i*3+1];
      const sz = positions[i*3+2];
      const tx = scatterTargets[i*3];
      const ty = scatterTargets[i*3+1];
      const tz = scatterTargets[i*3+2];
      const e = easeInOutCubic(t);
      positions[i*3] = sx + (tx - sx) * e * 0.4;  // 不完全到位，留点惯性
      positions[i*3+1] = sy + (ty - sy) * e * 0.4;
      positions[i*3+2] = sz + (tz - sz) * e * 0.4;
    }
    if (elapsed >= DUR.SCATTER){
      // 散落完成，开始凝聚下一件兵器
      const name = ORDER[currentIdx];
      showName(name);
      phase = PH.ASSEMBLE;
      phaseStart = now;
    }
  }

  // 冲击波
  for (let i = ripples.length - 1; i >= 0; i--){
    const r = ripples[i];
    r.time += dt;
    if (r.time >= r.life){ ripples.splice(i, 1); continue; }
    const t = r.time / r.life;
    const radius = r.maxR * t;
    for (let p = 0; p < TOTAL; p++){
      const dx = positions[p*3] - r.origin.x;
      const dy = positions[p*3+1] - r.origin.y;
      const dz = positions[p*3+2] - r.origin.z;
      const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);
      const diff = dist - radius;
      if (Math.abs(diff) < 0.8){
        const force = (0.8 - Math.abs(diff)) * 12 * (1 - t);
        if (dist > 0.001){
          positions[p*3] += dx / dist * force * dt;
          positions[p*3+1] += dy / dist * force * dt;
          positions[p*3+2] += dz / dist * force * dt;
        }
      }
    }
  }

  posAttr.needsUpdate = true;

  // 相机：缓慢推进 + 摇移
  const breath = Math.sin(sceneTime * 0.25) * 0.4;
  camera.position.z = 5 + breath;
  camera.position.x = Math.sin(sceneTime * 0.15) * 0.4;
  camera.position.y = Math.cos(sceneTime * 0.2) * 0.3;
  camera.lookAt(0, 0, 0);

  // 整体旋转（HOLD 阶段慢速）
  const rotSpeed = phase === PH.HOLD ? 0.06 : (phase === PH.ASSEMBLE ? 0.1 : 0.15);
  pointsObj.rotation.y = sceneTime * rotSpeed;
  pointsObj.rotation.x = Math.sin(sceneTime * 0.12) * 0.08;

  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
