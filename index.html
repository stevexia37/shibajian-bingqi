// ===== 工具：每目标点复制为多个粒子 =====
const DENSITY=8;
const FIELD_R=4.5;

function mulberry32(seed){return function(){let t=seed+=0x6D2B79F5;t=Math.imul(t^t>>>15,t|1);t^=t+Math.imul(t^t>>>7,t|61);return((t^t>>>14)>>>0)/4294967296}}
const rng=mulberry32(2026);

function scatterPos(){
  const theta=rng()*Math.PI*2;
  const phi=Math.acos(2*rng()-1);
  const r=FIELD_R*Math.cbrt(rng())*0.9;
  return [r*Math.sin(phi)*Math.cos(theta),r*Math.sin(phi)*Math.sin(theta),r*Math.cos(phi)];
}

// 为每件兵器建立独立粒子组
const groups={}; // name -> {positions, colors, sizes, phases, count, geo, points}

const allParticles=[]; // 所有粒子对象汇总（用于统一动画）
// 全局 BufferGeometry：把所有粒子的 position/color/size/phase 串在一起
const totalBase=ORDER.reduce((s,n)=>s+TARGETS[n].length,0);
const TOTAL=totalBase*DENSITY;
const positions=new Float32Array(TOTAL*3);
const colors=new Float32Array(TOTAL*3);
const sizes=new Float32Array(TOTAL);
const phases=new Float32Array(TOTAL);
const targets=new Float32Array(TOTAL*3);     // 兵器目标位置
const scatters=new Float32Array(TOTAL*3);    // 散落目标位置
const velocities=new Float32Array(TOTAL*3);  // 速度（击碎时）
const isAlive=new Uint8Array(TOTAL);        // 1=当前兵器粒子,0=其他兵器粒子（暗藏）

let gIdx=0;
for(const name of ORDER){
  const pts=TARGETS[name];
  for(const p of pts){
    for(let k=0;k<DENSITY;k++){
      const s=scatterPos();
      positions[gIdx*3]=s[0];positions[gIdx*3+1]=s[1];positions[gIdx*3+2]=s[2];
      scatters[gIdx*3]=s[0];scatters[gIdx*3+1]=s[1];scatters[gIdx*3+2]=s[2];
      // 目标 = 兵器坐标（y 翻转）
      const tx=p[0]*2.5;
      const ty=-p[1]*2.5;
      const tz=(rng()-0.5)*0.08;
      targets[gIdx*3]=tx;
      targets[gIdx*3+1]=ty;
      targets[gIdx*3+2]=tz;

      // 颜色
      const w=rng();
      if(w<0.12){
        colors[gIdx*3]=1.0;colors[gIdx*3+1]=0.85;colors[gIdx*3+2]=0.5; // 金
      } else if(w<0.7){
        colors[gIdx*3]=0.96;colors[gIdx*3+1]=0.93;colors[gIdx*3+2]=0.86; // 银白
      } else {
        colors[gIdx*3]=0.85;colors[gIdx*3+1]=0.88;colors[gIdx*3+2]=0.95; // 冷
      }
      sizes[gIdx]=0.02*(0.7+rng()*0.7);
      phases[gIdx]=rng()*Math.PI*2;
      velocities[gIdx*3]=velocities[gIdx*3+1]=velocities[gIdx*3+2]=0;
      isAlive[gIdx]=0;
      gIdx++;
    }
  }
}

// ===== Shader =====
const geo=new THREE.BufferGeometry();
geo.setAttribute('position',new THREE.BufferAttribute(positions,3));
geo.setAttribute('color',new THREE.BufferAttribute(colors,3));
geo.setAttribute('size',new THREE.BufferAttribute(sizes,1));
geo.setAttribute('phase',new THREE.BufferAttribute(phases,1));
geo.setAttribute('alpha',new THREE.BufferAttribute(new Float32Array(TOTAL),1)); // 单独 alpha 属性控制生死

const mat=new THREE.ShaderMaterial({
  vertexShader:`
    attribute float size;
    attribute float phase;
    attribute float alpha;
    attribute vec3 color;
    varying vec3 vColor;
    varying float vAlpha;
    varying float vDist;
    void main(){
      vColor=color;
      vAlpha=alpha;
      vec4 mv=modelViewMatrix*vec4(position,1.0);
      vDist=-mv.z;
      gl_PointSize=size*420.0/vDist*alpha;
      gl_Position=projectionMatrix*mv;
    }
  `,
  fragmentShader:`
    varying vec3 vColor;
    varying float vAlpha;
    varying float vDist;
    void main(){
      vec2 uv=gl_PointCoord-vec2(0.5);
      float d=length(uv);
      if(d>0.5)discard;
      float a=smoothstep(0.5,0.05,d);
      float df=clamp(1.0-vDist/9.0,0.15,1.0);
      gl_FragColor=vec4(vColor,a*df*vAlpha);
    }
  `,
  transparent:true,
  blending:THREE.AdditiveBlending,
  depthWrite:false,
});

const pointsObj=new THREE.Points(geo,mat);
scene.add(pointsObj);

for(let i=0;i<bgN;i++){
  const th=rng()*Math.PI*2;
  const ph=Math.acos(2*rng()-1);
  const r=10+rng()*6;
  bgPos[i*3]=r*Math.sin(ph)*Math.cos(th);
  bgPos[i*3+1]=r*Math.sin(ph)*Math.sin(th);
  bgPos[i*3+2]=r*Math.cos(ph);
}
const bgGeo=new THREE.BufferGeometry();
bgGeo.setAttribute('position',new THREE.BufferAttribute(bgPos,3));

function setCurrentWeapon(idx){
  currentIdx=idx;
  const name=ORDER[idx];
  // 重置所有粒子的"散开目标"=当前位置
  for(let i=0;i<TOTAL;i++){
    scatters[i*3]=positions[i*3];
    scatters[i*3+1]=positions[i*3+1];
    scatters[i*3+2]=positions[i*3+2];
    velocities[i*3]=velocities[i*3+1]=velocities[i*3+2]=0;
    isAlive[i]=0;
    alphaArr[i]=0;
  }
  // 当前兵器粒子的 alpha 设为 1，其他仍为 0（未激活）
  // 但 isAlive=0 表示它们等待下一轮
  // 我们这里用 alpha=0/1 区分可见性，物理运动只对 alpha>0 的做
  showName(name);
  updateProgress(idx);
}

function showName(name){
  document.getElementById('char').textContent=name;
  document.getElementById('sub').textContent=SUB_TEXTS[name]||'';
  document.getElementById('name').classList.add('show');
}
function hideName(){
  document.getElementById('name').classList.remove('show');
}
function updateProgress(idx){
  const c=document.getElementById('progress');
  if(c.children.length!==ORDER.length){
    c.innerHTML='';
    for(let i=0;i<ORDER.length;i++){
      const d=document.createElement('div');
      d.className='dot';
      c.appendChild(d);
    }
  }
  for(let i=0;i<c.children.length;i++){
    const d=c.children[i];
    d.className='dot';
    if(i<idx)d.classList.add('passed');
    else if(i===idx)d.classList.add('active');
  }
}

const alphaArr=geo.getAttribute('alpha').array;

// 启动兵器 idx，激活对应粒子组
function activateWeapon(idx){
  currentIdx=idx;
  const name=ORDER[idx];

    scatters[i*3]=positions[i*3];
    scatters[i*3+1]=positions[i*3+1];
    scatters[i*3+2]=positions[i*3+2];
    velocities[i*3]=velocities[i*3+1]=velocities[i*3+2]=0;
    isAlive[i]=0;
    alphaArr[i]=0;
  }
  // 找出该兵器的目标点区间
  // 直接遍历每个粒子，根据其索引判断属于哪件兵器
  // 算法：累计 TARGETS 长度
  let baseStart=0;
  for(let i=0;i<idx;i++)baseStart+=TARGETS[ORDER[i]].length;
  const baseEnd=baseStart+TARGETS[name].length;
  // 激活范围：baseStart*DENSITY 到 baseEnd*DENSITY
  const pStart=baseStart*DENSITY;
  const pEnd=baseEnd*DENSITY;
  for(let i=pStart;i<pEnd;i++){
    isAlive[i]=1;
    alphaArr[i]=1;
  }
  phase=PH.ASSEMBLE;
  phaseStart=performance.now();
  showName(name);
  updateProgress(idx);
}

// ===== 入阵 =====
document.getElementById('startBtn').addEventListener('click',()=>{
  document.getElementById('intro').classList.add('hide');
  document.getElementById('title').classList.add('show');
  setTimeout(()=>document.getElementById('hint').classList.add('show'),3000);
  // 激活第一件兵器
  activateWeapon(0);
});

// ===== 冲击波 =====
const ripples=[];
canvas.addEventListener('pointerdown',(e)=>{
  const x=(e.clientX/window.innerWidth-0.5)*2;
  const y=-(e.clientY/window.innerHeight-0.5)*2;
  ripples.push({time:0,life:1.2,origin:new THREE.Vector3(x*1.5,y*1,0),maxR:5});
});

// ===== 缓动 =====
function easeInOutCubic(t){return t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2}
function easeOutCubic(t){return 1-Math.pow(1-t,3)}
function easeInQuad(t){return t*t}

// ===== 动画循环 =====
let lastFrame=performance.now();
function animate(now){
  const dt=Math.min(0.05,(now-lastFrame)/1000);
  sceneTime+=dt;
  lastFrame=now;
  const elapsed=now-phaseStart;
  const posAttr=geo.getAttribute('position');
  const alphaAttr=geo.getAttribute('alpha');

  if(phase===PH.ASSEMBLE){
    const t=Math.min(1,elapsed/DUR.ASSEMBLE);
    const e=easeInOutCubic(t);
    // 所有 alpha>0 的粒子从当前位置汇向兵器目标
    for(let i=0;i<TOTAL;i++){
      if(alphaArr[i]<0.5)continue;
      const sx=scatters[i*3],sy=scatters[i*3+1],sz=scatters[i*3+2];
      const tx=targets[i*3],ty=targets[i*3+1],tz=targets[i*3+2];
      // 加一点弧线偏移（向上盘旋汇聚）
      const arc=Math.sin(t*Math.PI)*0.3;
      positions[i*3]=sx+(tx-sx)*e;
      positions[i*3+1]=sy+(ty-sy)*e+arc;
      positions[i*3+2]=sz+(tz-sz)*e;
    }
    if(t>=1){
      phase=PH.HOLD;
      phaseStart=now;
    }
  } else if(phase===PH.HOLD){
    // 呼吸扰动 + 缓慢自转（只对 alpha>0 粒子）
    const wob=Math.sin(sceneTime*1.8)*0.003;
    for(let i=0;i<TOTAL;i++){
      if(alphaArr[i]<0.5)continue;
      const tx=targets[i*3]+Math.sin(sceneTime*1.5+phases[i])*0.004;
      const ty=targets[i*3+1]+Math.cos(sceneTime*1.3+phases[i])*0.004;
      const tz=targets[i*3+2];
      positions[i*3]=tx;
      positions[i*3+1]=ty;
      positions[i*3+2]=tz+wob;
    }
    if(elapsed>=DUR.HOLD){
      phase=PH.SHATTER;
      phaseStart=now;
      // 给激活粒子一个向外速度
      for(let i=0;i<TOTAL;i++){
        if(alphaArr[i]<0.5)continue;
        const px=positions[i*3],py=positions[i*3+1],pz=positions[i*3+2];
        const d=Math.sqrt(px*px+py*py+pz*pz)+0.001;
        const sp=2.0+rng()*1.8;
        velocities[i*3]=px/d*sp;
        velocities[i*3+1]=py/d*sp+0.3;  // 略微向上飘
        velocities[i*3+2]=pz/d*sp;
      }
      hideName();
    }
  } else if(phase===PH.SHATTER){
    const t=Math.min(1,elapsed/DUR.SHATTER);
    for(let i=0;i<TOTAL;i++){
      if(alphaArr[i]<0.5)continue;
      positions[i*3]+=velocities[i*3]*dt;
      positions[i*3+1]+=velocities[i*3+1]*dt;
      positions[i*3+2]+=velocities[i*3+2]*dt;
      velocities[i*3]*=0.93;
      velocities[i*3+1]*=0.93;
      velocities[i*3+2]*=0.93;
      // 渐隐
      alphaArr[i]=1-t;
    }
    if(t>=1){
      phase=PH.SCATTER;
      phaseStart=now;
      // 把这些粒子藏起来（alpha=0），保留位置
      for(let i=0;i<TOTAL;i++){
        if(velocities[i*3]!==0||velocities[i*3+1]!==0||velocities[i*3+2]!==0){
          // 击碎过的粒子
          alphaArr[i]=0;
          // 把它们推到远处
          const dir=new THREE.Vector3(positions[i*3],positions[i*3+1],positions[i*3+2]).normalize();
          positions[i*3]=dir.x*8;positions[i*3+1]=dir.y*8;positions[i*3+2]=dir.z*8;
          scatters[i*3]=positions[i*3];scatters[i*3+1]=positions[i*3+1];scatters[i*3+2]=positions[i*3+2];
        }
      }
    }
  } else if(phase===PH.SCATTER){
    // 等动画过渡
    if(elapsed>=DUR.SCATTER){
      const next=(currentIdx+1)%ORDER.length;
      activateWeapon(next);
    }
  } else if(phase===PH.IDLE){
    // 入场前：所有粒子轻轻漂浮
    for(let i=0;i<TOTAL;i++){
      positions[i*3]+=Math.sin(sceneTime*0.3+phases[i])*0.001;
      positions[i*3+1]+=Math.cos(sceneTime*0.4+phases[i])*0.001;
    }
  }

  // 冲击波
  for(let i=ripples.length-1;i>=0;i--){
    const r=ripples[i];
    r.time+=dt;
    if(r.time>=r.life){ripples.splice(i,1);continue}
    const t=r.time/r.life;
    const radius=r.maxR*t;
    for(let p=0;p<TOTAL;p++){
      if(alphaArr[p]<0.5)continue;
      const dx=positions[p*3]-r.origin.x;
      const dy=positions[p*3+1]-r.origin.y;
      const dz=positions[p*3+2]-r.origin.z;
      const dist=Math.sqrt(dx*dx+dy*dy+dz*dz);
      const diff=dist-radius;
      if(Math.abs(diff)<0.6){
        const force=(0.6-Math.abs(diff))*8*(1-t);
        if(dist>0.001){
          positions[p*3]+=dx/dist*force*dt;
          positions[p*3+1]+=dy/dist*force*dt;
          positions[p*3+2]+=dz/dist*force*dt;
        }
      }
    }
  }

  posAttr.needsUpdate=true;
  alphaAttr.needsUpdate=true;

  // 相机浮动
  camera.position.x=Math.sin(sceneTime*0.18)*0.2;
  camera.position.y=Math.cos(sceneTime*0.22)*0.15;
  camera.position.z=camOrigin.z+Math.sin(sceneTime*0.3)*0.1;
  camera.lookAt(0,0,0);

  // 整体旋转
  pointsObj.rotation.y=sceneTime*0.1;
  pointsObj.rotation.x=Math.sin(sceneTime*0.15)*0.05;

  renderer.render(scene,camera);
  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);

window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});
</script>
